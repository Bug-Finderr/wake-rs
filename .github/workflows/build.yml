name: build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wake-linux-x64
          - os: macos-latest
            artifact: wake-macos-arm64
          - os: windows-latest
            artifact: wake.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: bash tests/smoke_linux.sh target/release/wake

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh tests/smoke_windows.ps1 target/release/wake.exe

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          target/release/wake --version | grep -F 'wake '
          target/release/wake --help | grep -F 'wake --until-charge N'

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/wake.exe "dist/${{ matrix.artifact }}"
          else
            cp target/release/wake "dist/${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*/* --clobber
