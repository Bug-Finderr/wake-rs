name: build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - run: cargo build --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    permissions:
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wake-linux-x64
          - os: macos-latest
            artifact: wake-macos-arm64
          - os: windows-latest
            artifact: wake.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Lint + test on every OS so the cfg-gated windows/macos code (and FFI) is actually covered.
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release --locked

      - run: cargo build --release --locked

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: bash tests/smoke_linux.sh target/release/wake

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh tests/smoke_windows.ps1 target/release/wake.exe

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          target/release/wake --version | grep -F 'wake '
          target/release/wake --help | grep -F 'wake --until-charge N'

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/wake.exe "dist/${{ matrix.artifact }}"
          else
            cp target/release/wake "dist/${{ matrix.artifact }}"
          fi

      - name: Checksum artifact
        shell: bash
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Attach binaries and checksums to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*/* --clobber
